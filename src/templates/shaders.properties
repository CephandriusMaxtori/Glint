# ============================================================
# shaders.properties — Shaderpack configuration for Iris/OptiFine
# ============================================================
# This file tells the shader loader which programs/passes exist
# and how they link together. Each "program.<name>" defines a
# render pass with its vertex and fragment shader files.
#
# Injection marker:
#   //__SHADERPACK_NAME__  — replaced with the user's chosen name
# ============================================================

name=Minecraft Shader Generator
description=A shaderpack generated by the web-based Minecraft Shader Generator tool.

# --- GBUFFERS passes (deferred rendering) ---
# These run during the main world render and write to multiple
# color buffers (MRT) for later composite passes.

program.gbuffers_terrain
program.gbuffers_water

# --- Composite passes (post-processing) ---
# Runs after all gbuffers are complete. Reads from the color
# buffers written by the gbuffers passes.

program.composite

# --- Final pass (output to screen) ---
# The last pass before the frame is displayed. Applies gamma
# correction and any final tonemapping.

program.final

# --- Shadow pass (optional) ---
# Renders the scene from the light's perspective for shadow
# mapping. If omitted, shadows fall back to vanilla behavior.

program.shadow
